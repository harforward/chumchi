<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Chumchi</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100% !important;
      min-height: 100vh !important;
      overflow: hidden !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    /* ── Deep warm background — always dark regardless of host page ── */
    body {
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;

      background: transparent;
    }



    /* ── Centering shell ── */
    .stage {
      position: relative;
      z-index: 10;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Box — semi-transparent warm tint over the dark sunrise ── */
    .box {
      position: relative;
      width: 300px;
      padding: 2.8rem 2.4rem 2.4rem;

      /* Warm cream at 14% — visible tint, sunrise bleeds through */
      background: rgba(20, 8, 4, 0.52);

      /* Thin warm border defines the box without heavy background */
      border: 1px solid rgba(255,220,180,0.18);

      animation: rise 0.85s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes rise {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Bracket corners — cream, clearly visible on dark bg ── */
    .c {
      position: absolute;
      width: 16px;
      height: 16px;
      border-style: solid;
      border-color: rgba(255, 228, 185, 0.72);
    }
    .c-tl { top:-1px;    left:-1px;    border-width: 1.5px 0 0 1.5px; }
    .c-tr { top:-1px;    right:-1px;   border-width: 1.5px 1.5px 0 0; }
    .c-bl { bottom:-1px; left:-1px;    border-width: 0 0 1.5px 1.5px; }
    .c-br { bottom:-1px; right:-1px;   border-width: 0 1.5px 1.5px 0; }

    /* ── CHUMCHI wordmark ── */
    .wordmark {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: 0;
    }

    .spoon {
      width: 13px;
      flex-shrink: 0;
      margin-right: 10px;
      margin-top: -1px;
      /* Spoon is cream — readable on dark bg */
    }

    .wordmark-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 28px;
      letter-spacing: 0.20em;
      padding-right: 0.20em;
      text-transform: uppercase;
      white-space: nowrap;
      /* Warm cream — clear contrast against dark sunrise */
      color: #f5e8d0;
      line-height: 1;
      text-shadow:
        0 0 24px rgba(240,170,70,0.45),
        0 1px 3px rgba(0,0,0,0.6);
    }

    /* ── SILVER SPOON ENERGY — cyan + magenta contrast on dark bg ── */
    .tagline {
      margin-top: 0.65rem;
      text-align: center;
      width: 100%;

      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 8.5px;
      letter-spacing: 0.34em;
      padding-right: 0.34em;
      text-transform: uppercase;
      white-space: nowrap;

      /*
        CONTRAST FIX: bevel silver gradient is invisible on white/light bg.
        On dark bg it reads well. Keep it. Cyan shadow left, magenta right.
        The glow makes it visible at any opacity.
      */
      background: linear-gradient(
        180deg,
        #e8eeff 0%,
        #c8d4f8 30%,
        #a0b0e8 60%,
        #c0ccf4 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;

      /* Cyan+magenta chromatic highlights — clear on dark */
      filter:
        drop-shadow(-1.5px 0 6px rgba(0, 220, 255, 0.75))
        drop-shadow(1.5px 0 6px rgba(240, 30, 200, 0.65))
        drop-shadow(0 0 3px rgba(255,255,255,0.5));

      animation: chromaGlow 4s ease-in-out infinite;
    }

    @keyframes chromaGlow {
      0%,100% {
        filter:
          drop-shadow(-1.5px 0 5px rgba(0,220,255,0.60))
          drop-shadow(1.5px  0 5px rgba(240,30,200,0.55))
          drop-shadow(0 0 2px rgba(255,255,255,0.4));
      }
      50% {
        filter:
          drop-shadow(-2px 0 10px rgba(0,220,255,0.95))
          drop-shadow(2px  0 10px rgba(240,30,200,0.90))
          drop-shadow(0 0 8px rgba(255,255,255,0.7));
      }
    }

    /* ── Hairline divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 1.8rem 0 1.6rem;
      width: 100%;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255,220,170,0.22);
    }
    .divider-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(0,220,255,0.55);
      flex-shrink: 0;
      box-shadow: 0 0 5px rgba(0,220,255,0.6);
    }

    /* ── Input row ── */
    .field {
      display: flex;
      width: 100%;
      border: 1px solid rgba(255,220,180,0.22);
      transition: border-color 0.22s, box-shadow 0.22s;
    }

    .field:focus-within {
      border-color: rgba(0,220,255,0.45);
      box-shadow:
        0 0 14px rgba(0,220,255,0.22),
        0 0 28px rgba(240,30,200,0.14);
    }

    .field input {
      flex: 1;
      min-width: 0;
      padding: 0.88rem 0.95rem;
      background: rgba(255,230,190,0.05);
      border: none;
      outline: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-style: italic;
      letter-spacing: 0.10em;
      /* Cream text — clearly visible on dark */
      color: rgba(245, 232, 208, 0.90);
      -webkit-appearance: none;
      border-radius: 0;
    }

    .field input::placeholder {
      /* Cyan tint placeholder — visible and sophisticated on dark bg */
      color: rgba(140, 210, 230, 0.55);
      font-style: italic;
      letter-spacing: 0.14em;
    }

    .field button {
      flex-shrink: 0;
      padding: 0.88rem 1.1rem;
      background: rgba(196, 100, 48, 0.38);
      border: none;
      border-left: 1px solid rgba(255,220,180,0.16);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      /* Cream text on button */
      color: rgba(245,232,208,0.85);
      white-space: nowrap;
      border-radius: 0;
      -webkit-appearance: none;
      transition: background 0.22s, color 0.22s;
    }

    .field button:hover {
      background: rgba(196,100,48,0.62);
      color: #f5e8d0;
    }
    .field button:active { background: rgba(196,100,48,0.80); }

    /* ── Error ── */
    .err {
      margin-top: 0.6rem;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: rgba(255,160,120,0.80);
      min-height: 1rem;
    }

    /* ── Responsive ── */
    @media (max-width: 399px) {
      .box { width: 276px; padding: 2.4rem 2rem 2rem; }
      .wordmark-text { font-size: 25px; }
      .tagline { font-size: 7.5px; letter-spacing: 0.28em; padding-right: 0.28em; }
    }
    @media (max-width: 319px) {
      .box { width: 252px; padding: 2rem 1.7rem 1.8rem; }
      .wordmark-text { font-size: 22px; }
      .tagline { font-size: 7px; letter-spacing: 0.22em; padding-right: 0.22em; }
    }
    @media (prefers-reduced-motion: reduce) {
      .box, body::after { animation: none; }
      .tagline { animation: none; }
    }

  </style>
</head>
<body>

  <div class="stage">
    <div class="box">

      <span class="c c-tl"></span>
      <span class="c c-tr"></span>
      <span class="c c-bl"></span>
      <span class="c c-br"></span>

      <div class="wordmark">
        <svg class="spoon" viewBox="0 0 20 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="10" cy="8" rx="5.5" ry="7.2" stroke="#f5e8d0" stroke-width="1.2" opacity="0.75"/>
          <line x1="10" y1="15.2" x2="10" y2="51" stroke="#f5e8d0" stroke-width="1.2" stroke-linecap="round" opacity="0.75"/>
        </svg>
        <span class="wordmark-text">Chumchi</span>
      </div>

      <div class="tagline">Silver Spoon Energy</div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-dot"></div>
        <div class="divider-line"></div>
      </div>

      <div class="field">
        <input
          type="password"
          id="pwd"
          placeholder="Access Here"
          autocomplete="off"
          onkeydown="if(event.key==='Enter') go()"
        />
        <button onclick="go()">Enter</button>
      </div>

      <p class="err" id="err"></p>

    </div>
  </div>

  <script>
    // Clear any stale site flag when landing on index
    // Index is always the entry point — never auto-skip it
    sessionStorage.removeItem('chumchi_site');
    sessionStorage.removeItem('chumchi_session');

    function go() {
      const v = document.getElementById('pwd').value.trim();
      if (v === 'tree2026') {
        sessionStorage.setItem('chumchi_site', 'true');
        window.location.href = 'platform/login.html';
      } else {
        document.getElementById('err').textContent = 'Incorrect — try again.';
        document.getElementById('pwd').value = '';
        document.getElementById('pwd').focus();
      }
    }
  </script>

</body>
</html>
