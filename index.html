<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Chumchi</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100% !important;
      height: 100% !important;
      min-height: 100vh !important;
      overflow: hidden !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      display: flex;
      align-items: center;
      justify-content: center;

      background: transparent;
    }

    /* No body pseudo-element — background is the page behind */

    /* ── Centering shell ── */
    .stage {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      padding: 1rem;
    }

    /* ── Glass box — fully transparent, no blur, sunrise fully visible ── */
    .box {
      position: relative;
      width: 300px;
      padding: 2.8rem 2.4rem 2.4rem;

      /* Light cream tint — readable but sunrise shows through */
      background: rgba(253, 240, 220, 0.16);
      /* No backdrop-filter — would frost over the background */
      border: 1px solid rgba(255,230,200,0.12);

      animation: rise 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Bracket corners ── */
    .c {
      position: absolute;
      width: 14px;
      height: 14px;
      border-style: solid;
      border-color: rgba(255,230,200,0.65);
    }
    .c-tl { top: 0;    left: 0;    border-width: 1px 0 0 1px; }
    .c-tr { top: 0;    right: 0;   border-width: 1px 1px 0 0; }
    .c-bl { bottom: 0; left: 0;    border-width: 0 0 1px 1px; }
    .c-br { bottom: 0; right: 0;   border-width: 0 1px 1px 0; }

    /* ── Wordmark ── */
    .wordmark {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .spoon {
      width: 12px;
      flex-shrink: 0;
      margin-right: 9px;
      margin-top: -1px;
    }

    .wordmark-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 28px;
      /* letter-spacing wide but controlled — 0.20em stays in box */
      letter-spacing: 0.20em;
      /* optical right compensation for trailing gap */
      padding-right: 0.20em;
      text-transform: uppercase;
      white-space: nowrap;
      color: rgba(255, 240, 215, 0.96);
      line-height: 1;
      /* Warm text glow */
      text-shadow:
        0 0 18px rgba(255,180,80,0.35),
        0 1px 2px rgba(0,0,0,0.3);
    }

    /* ── Silver Spoon Energy — bevel caps, magenta+cyan glow ── */
    .tagline {
      margin-top: 0.6rem;
      text-align: center;
      width: 100%;

      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 9px;
      letter-spacing: 0.30em;
      padding-right: 0.30em;
      text-transform: uppercase;
      white-space: nowrap;

      /* Bevel silver gradient */
      background: linear-gradient(
        175deg,
        rgba(255,255,255,0.98) 0%,
        rgba(210,215,235,0.93) 28%,
        rgba(160,168,195,0.88) 58%,
        rgba(205,212,230,0.93) 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;

      /* Magenta left, cyan right — chromatic bevel */
      filter:
        drop-shadow(-2px 0 5px rgba(220,40,180,0.6))
        drop-shadow(2px 0 5px rgba(0,210,240,0.5))
        drop-shadow(0 0 2px rgba(255,255,255,0.7));

      animation: chromaShift 4.5s ease-in-out infinite;
    }

    @keyframes chromaShift {
      0%,100% {
        filter:
          drop-shadow(-2px 0 4px rgba(220,40,180,0.5))
          drop-shadow(2px 0 4px rgba(0,210,240,0.4))
          drop-shadow(0 0 2px rgba(255,255,255,0.6));
      }
      50% {
        filter:
          drop-shadow(-3px 0 9px rgba(220,40,180,0.85))
          drop-shadow(3px 0 9px rgba(0,210,240,0.75))
          drop-shadow(0 0 5px rgba(255,255,255,0.9));
      }
    }

    /* ── Hairline divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 1.7rem 0 1.5rem;
      width: 100%;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255,230,200,0.28);
    }
    .divider-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(255,200,100,0.6);
      flex-shrink: 0;
    }

    /* ── Input row ── */
    .field {
      display: flex;
      width: 100%;
      border: 1px solid rgba(255,230,200,0.22);
      /* Access Here glow — magenta+cyan */
      box-shadow:
        0 0 10px rgba(220,40,180,0.10),
        0 0 16px rgba(0,210,240,0.08);
      transition: box-shadow 0.25s;
    }

    .field:focus-within {
      border-color: rgba(255,230,200,0.40);
      box-shadow:
        0 0 18px rgba(220,40,180,0.28),
        0 0 28px rgba(0,210,240,0.22),
        inset 0 0 6px rgba(255,220,180,0.04);
    }

    .field input {
      flex: 1;
      min-width: 0;
      padding: 0.84rem 0.9rem;
      background: rgba(255,230,200,0.05);
      border: none;
      outline: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-style: italic;
      letter-spacing: 0.10em;
      color: rgba(255, 240, 215, 0.88);
      -webkit-appearance: none;
      border-radius: 0;
    }

    .field input::placeholder {
      color: rgba(255,240,215,0.28);
      font-style: italic;
      letter-spacing: 0.14em;
    }

    .field button {
      flex-shrink: 0;
      padding: 0.84rem 1rem;
      background: rgba(200,100,50,0.28);
      border: none;
      border-left: 1px solid rgba(255,230,200,0.14);
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(255,240,215,0.82);
      white-space: nowrap;
      border-radius: 0;
      -webkit-appearance: none;
      transition: background 0.2s;
    }

    .field button:hover  { background: rgba(200,100,50,0.52); }
    .field button:active { background: rgba(200,100,50,0.70); }

    /* ── Error ── */
    .err {
      margin-top: 0.55rem;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: rgba(255,180,140,0.72);
      min-height: 1rem;
    }

    /* ── Responsive breakpoints (fixed px only) ── */
    @media (max-width: 399px) {
      .box { width: 278px; padding: 2.3rem 2rem 2rem; }
      .wordmark-text { font-size: 25px; letter-spacing: 0.18em; padding-right: 0.18em; }
      .tagline { font-size: 8px; letter-spacing: 0.26em; padding-right: 0.26em; }
    }

    @media (max-width: 319px) {
      .box { width: 254px; padding: 2rem 1.7rem 1.8rem; }
      .wordmark-text { font-size: 22px; letter-spacing: 0.14em; padding-right: 0.14em; }
      .tagline { font-size: 7.5px; letter-spacing: 0.22em; padding-right: 0.22em; }
    }

    @media (prefers-reduced-motion: reduce) {
      .box { animation: none; }
      body::before, .tagline { animation: none; }
    }

  </style>
</head>
<body>

  <div class="stage">
    <div class="box">

      <span class="c c-tl"></span>
      <span class="c c-tr"></span>
      <span class="c c-bl"></span>
      <span class="c c-br"></span>

      <div class="wordmark">
        <svg class="spoon" viewBox="0 0 20 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="10" cy="8" rx="5.5" ry="7.2" stroke="rgba(255,240,215,0.72)" stroke-width="1.1"/>
          <line x1="10" y1="15.2" x2="10" y2="51" stroke="rgba(255,240,215,0.72)" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
        <span class="wordmark-text">Chumchi</span>
      </div>

      <div class="tagline">Silver Spoon Energy</div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-dot"></div>
        <div class="divider-line"></div>
      </div>

      <div class="field">
        <input
          type="password"
          id="pwd"
          placeholder="Access Here"
          autocomplete="off"
          onkeydown="if(event.key==='Enter') go()"
        />
        <button onclick="go()">Enter</button>
      </div>

      <p class="err" id="err"></p>

    </div>
  </div>

  <script>
    if (sessionStorage.getItem('chumchi_site') === 'true') {
      window.location.href = 'platform/login.html';
    }
    function go() {
      const v = document.getElementById('pwd').value.trim();
      if (v === 'tree2026') {
        sessionStorage.setItem('chumchi_site', 'true');
        window.location.href = 'platform/login.html';
      } else {
        document.getElementById('err').textContent = 'Incorrect — try again.';
        document.getElementById('pwd').value = '';
        document.getElementById('pwd').focus();
      }
    }
  </script>

</body>
</html>
