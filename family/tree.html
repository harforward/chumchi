<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chumchi — Family Tree</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FDF6EC; --blush: #F2C4B0; --sage: #C8D8C0;
      --saffron: #F0C070; --lilac: #D4C0D8; --clay: #C4785A;
      --bark: #6B4F3A; --ink: #2C2118; --white: #FFFFFF;
    }

    body {
      background: #FFFFFF;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ══ TOP NAV ══ */
    .top-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(107,79,58,0.08);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      z-index: 100;
      gap: 1rem;
    }

    .nav-hamburger {
      width: 36px; height: 36px;
      border: none;
      background: none;
      cursor: grab;
      padding-bottom: 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .nav-hamburger:hover { background: rgba(107,79,58,0.06); }
    .nav-hamburger span {
      display: block;
      height: 1.5px;
      background: var(--bark);
      border-radius: 2px;
      transition: all 0.25s;
    }

    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--bark);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .nav-brand svg { width: 12px; opacity: 0.6; }

    .nav-tree-label {
      margin-left: auto;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--bark);
      opacity: 0.35;
    }

    /* ══ SIDEBAR ══ */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 240px;
      height: 100vh;
      background: rgba(107,79,58,0.96);
      backdrop-filter: blur(12px);
      z-index: 200;
      transform: translateX(-100%);
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
      padding: 1.5rem 0;
      box-shadow: 4px 0 32px rgba(44,33,24,0.18);
    }

    .sidebar.open { transform: translateX(0); }

    .sidebar-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none; border: none;
      color: rgba(253,246,236,0.5);
      font-size: 1.1rem;
      cursor: grab;
      padding-bottom: 28px;
      transition: color 0.2s;
    }
    .sidebar-close:hover { color: rgba(253,246,236,0.9); }

    .sidebar-brand {
      padding: 0 1.5rem 1.5rem;
      border-bottom: 1px solid rgba(253,246,236,0.1);
      margin-bottom: 0.5rem;
    }

    .sidebar-brand span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(253,246,236,0.9);
    }

    .sidebar-brand small {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.72rem;
      color: rgba(240,192,112,0.7);
      letter-spacing: 0.1em;
      margin-top: 0.1rem;
    }

    .sidebar-nav { flex: 1; padding: 0.5rem 0; }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.75rem 1.5rem;
      color: rgba(253,246,236,0.65);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: all 0.2s;
      cursor: grab;
      padding-bottom: 28px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: 'Inter', sans-serif;
    }

    .sidebar-item:hover,
    .sidebar-item.active {
      color: rgba(253,246,236,0.95);
      background: rgba(253,246,236,0.08);
    }

    .sidebar-item .icon {
      font-size: 0.95rem;
      width: 18px;
      text-align: center;
      opacity: 0.7;
    }

    .sidebar-section {
      padding: 0.5rem 1.5rem 0.25rem;
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(253,246,236,0.25);
      margin-top: 0.5rem;
    }

    .sidebar-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid rgba(253,246,236,0.1);
    }

    .sidebar-footer button {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(253,246,236,0.35);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: color 0.2s;
    }
    .sidebar-footer button:hover { color: rgba(253,246,236,0.7); }

    /* Sidebar overlay */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,33,24,0.3);
      z-index: 199;
    }
    .sidebar-overlay.open { display: block; }

    /* ══ MOLECULE CANVAS ══ */
    .tree-canvas {
      position: fixed;
      top: 52px; left: 0;
      width: 100%;
      height: calc(100vh - 52px);
      overflow: hidden;
      z-index: 2;
    }

    #moleculeSvg {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* ══ BUBBLE NODES ══ */
    .node {
      position: absolute;

      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: grab;
      padding-bottom: 28px;
      z-index: 10;
      user-select: none;
    }

    .node-bubble {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    }

    .node:hover .node-bubble { transform: scale(1.1); }
    .node.active .node-bubble { transform: scale(1.12); }

    /* Pulsing paisley glow */
    .node-bubble::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        rgba(196,120,90,0.0),
        rgba(240,192,112,0.35),
        rgba(212,192,216,0.25),
        rgba(200,216,192,0.3),
        rgba(242,196,176,0.35),
        rgba(196,120,90,0.0)
      );
      animation: paisleyPulse 3.5s ease-in-out infinite;
      z-index: -1;
      filter: blur(3px);
    }

    @keyframes paisleyPulse {
      0%,100% { opacity: 0.4; transform: scale(0.95) rotate(0deg); }
      50%      { opacity: 1;   transform: scale(1.12) rotate(180deg); }
    }

    /* Subtle glow pulse instead of position drift (position is JS-controlled) */
    @keyframes drift { 0%,100% { opacity:1; } 50% { opacity:0.92; } }

    .node-label {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--bark);
      text-align: center;
      line-height: 1.2;
      white-space: nowrap;
      pointer-events: none;
      background: rgba(255,255,255,0.82);
      padding: 1px 4px;
      border-radius: 3px;
    }

    .node-role {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--clay);
      opacity: 0.72;
      white-space: nowrap;
      pointer-events: none;
      background: rgba(255,255,255,0.7);
      padding: 1px 4px;
      border-radius: 3px;
    }

    .node-recipe-badge {
      position: absolute;
      top: -4px; right: -4px;
      background: var(--saffron);
      color: var(--bark);
      font-size: 0.52rem;
      font-weight: 700;
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
      z-index: 2;
    }

    /* ══ HIGHLIGHT PANEL (click 1) ══ */
    .highlight-panel {
      position: fixed;
      z-index: 300;
      background: rgba(255,255,255,0.97);
      border-radius: 0;
      width: 230px;
      box-shadow: 0 8px 40px rgba(107,79,58,0.16);
      animation: panelIn 0.2s ease;
      border-top: 2px solid var(--clay);
    }

    /* Bracket corners on panel */
    .highlight-panel::before,
    .highlight-panel::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-color: var(--clay);
      border-style: solid;
    }
    .highlight-panel::before { bottom: -1px; left: -1px; border-width: 0 0 1px 1px; }
    .highlight-panel::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(6px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .hp-inner { padding: 1.2rem 1.3rem; }

    .hp-head {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 0.8rem;
    }

    .hp-avatar-sm {
      width: 36px; height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .hp-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--bark);
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .hp-role-tag {
      font-size: 0.58rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--clay);
    }

    .hp-recipes-preview {
      list-style: none;
      margin-bottom: 0.9rem;
    }

    .hp-recipes-preview li {
      font-size: 0.76rem;
      color: var(--ink);
      padding: 0.22rem 0;
      border-bottom: 1px solid rgba(107,79,58,0.05);
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .hp-recipes-preview li::before {
      content: '';
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--clay);
      opacity: 0.5;
      flex-shrink: 0;
    }

    .hp-empty {
      font-size: 0.73rem;
      font-style: italic;
      color: var(--bark);
      opacity: 0.35;
      margin-bottom: 0.9rem;
    }

    .hp-note {
      font-size: 0.63rem;
      color: var(--clay);
      opacity: 0.65;
      font-style: italic;
      margin-bottom: 0.9rem;
      line-height: 1.5;
    }

    .hp-cta {
      display: block;
      width: 100%;
      padding: 0.65rem;
      background: var(--bark);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      border: none;
      cursor: grab;
      padding-bottom: 28px;
      transition: background 0.2s;
    }
    .hp-cta:hover { background: var(--clay); }

    .hp-close {
      position: absolute;
      top: 0.5rem; right: 0.6rem;
      background: none; border: none;
      font-size: 0.85rem;
      color: var(--bark); opacity: 0.3;
      cursor: grab;
      padding-bottom: 28px;
      transition: opacity 0.2s;
    }
    .hp-close:hover { opacity: 0.8; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      background: var(--bark);
      color: var(--cream);
      padding: 0.75rem 1.3rem;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      z-index: 999;
      animation: toastIn 0.28s ease;
      box-shadow: 0 4px 20px rgba(107,79,58,0.25);
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .node { animation: none; }
      .node-bubble::before { animation: none; }
    }
  </style>
</head>
<body>

  <!-- Sidebar injected by nav.js buildSidebar() -->

  <!-- Top nav -->
  <nav class="top-nav">
    <button class="nav-hamburger" id="navHamburger">
      <span></span><span></span><span></span>
    </button>
    <a href="tree.html" class="nav-brand">
      <svg viewBox="0 0 24 60" fill="none"><ellipse cx="12" cy="10" rx="7" ry="9" stroke="#6B4F3A" stroke-width="1.3"/><line x1="12" y1="19" x2="12" y2="58" stroke="#6B4F3A" stroke-width="1.3" stroke-linecap="round"/></svg>
      Chumchi
    </a>
    <span class="nav-tree-label">The Rafiq Tree</span>
    <button onclick="doLogout()" style="margin-left:auto;background:none;border:none;
      cursor:pointer;font-family:'Inter',sans-serif;font-size:0.58rem;
      letter-spacing:0.16em;text-transform:uppercase;color:var(--bark);
      opacity:0.38;transition:opacity 0.2s;padding:0.3rem 0.6rem;"
      onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=0.38">
      Sign Out
    </button>
  </nav>

  <!-- SVG connectors -->
  <svg id="moleculeSvg" xmlns="http://www.w3.org/2000/svg"></svg>

  <!-- Tree canvas -->
  <div class="tree-canvas" id="treeCanvas"></div>

  <script src="../assets/app.js"></script>
  <script src="../assets/nav.js"></script>
  <script>

    // ── Auth ──
    function doLogout() { sessionStorage.clear(); window.location.href = '../index.html'; }
    if (sessionStorage.getItem('chumchi_site') !== 'true') window.location.href = '../index.html';
    const sess = JSON.parse(sessionStorage.getItem('chumchi_session') || 'null');
    if (!sess) window.location.href = '../platform/login.html';

    // ── Build shared sidebar (safe if nav.js not loaded) ──
    if (typeof buildSidebar === 'function') buildSidebar('tree', sess?.role);

    // ── Expressive Robot Avatar Generator ──
    const AVATAR_PALETTES = [
      { bg: '#F2C4B0', face: '#6B4F3A', accent: '#F0C070', shine: '#fff8f0' },
      { bg: '#C8D8C0', face: '#2C4A2C', accent: '#F2C4B0', shine: '#f0fff0' },
      { bg: '#D4C0D8', face: '#4A2C6B', accent: '#F0C070', shine: '#fdf0ff' },
      { bg: '#F0C070', face: '#5A3A0A', accent: '#D4C0D8', shine: '#fffdf0' },
      { bg: '#E8D5C0', face: '#4A3020', accent: '#C4785A', shine: '#fff8f0' },
      { bg: '#C4785A', face: '#FDF6EC', accent: '#F0C070', shine: '#fff0e8' },
      { bg: '#B8D4C8', face: '#1A3A2A', accent: '#F2C4B0', shine: '#f0fff8' },
      { bg: '#E0C8D8', face: '#3A1A3A', accent: '#F0C070', shine: '#fff0f8' },
      { bg: '#D8E0C8', face: '#2A3A1A', accent: '#C4785A', shine: '#f8fff0' },
      { bg: '#C8D0E8', face: '#1A2A4A', accent: '#F2C4B0', shine: '#f0f0ff' },
    ];

    // Fully hand-crafted unique face per member
    const MEMBER_FACES = {
      rafiq_khan: (s, p) => ({
        head: `<rect x="${s*.1}" y="${s*.18}" width="${s*.8}" height="${s*.68}" rx="${s*.12}" fill="${p.bg}"/>`,
        extras: `<rect x="${s*.3}" y="${s*.06}" width="${s*.4}" height="${s*.16}" rx="${s*.04}" fill="${p.accent}"/>
                 <circle cx="${s*.5}" cy="${s*.06}" r="${s*.05}" fill="${p.face}" opacity=".5"/>`,
        eyes: `<ellipse cx="${s*.34}" cy="${s*.44}" rx="${s*.08}" ry="${s*.1}" fill="${p.face}"/>
               <ellipse cx="${s*.66}" cy="${s*.44}" rx="${s*.08}" ry="${s*.1}" fill="${p.face}"/>
               <circle cx="${s*.36}" cy="${s*.42}" r="${s*.03}" fill="${p.shine}"/>
               <circle cx="${s*.68}" cy="${s*.42}" r="${s*.03}" fill="${p.shine}"/>`,
        brows: `<path d="M${s*.26} ${s*.33} Q${s*.34} ${s*.28} ${s*.42} ${s*.33}" stroke="${p.face}" stroke-width="${s*.025}" fill="none" stroke-linecap="round"/>
                <path d="M${s*.58} ${s*.33} Q${s*.66} ${s*.28} ${s*.74} ${s*.33}" stroke="${p.face}" stroke-width="${s*.025}" fill="none" stroke-linecap="round"/>`,
        mouth: `<path d="M${s*.32} ${s*.68} Q${s*.5} ${s*.78} ${s*.68} ${s*.68}" stroke="${p.face}" stroke-width="${s*.03}" fill="none" stroke-linecap="round"/>`,
        beard: `<ellipse cx="${s*.5}" cy="${s*.8}" rx="${s*.18}" ry="${s*.06}" fill="${p.face}" opacity=".25"/>`,
      }),
      mukhadis: (s, p) => ({
        head: `<circle cx="${s*.5}" cy="${s*.5}" r="${s*.42}" fill="${p.bg}"/>`,
        extras: `<path d="M${s*.2} ${s*.28} Q${s*.5} ${s*.05} ${s*.8} ${s*.28}" stroke="${p.accent}" stroke-width="${s*.05}" fill="none"/>
                 <circle cx="${s*.28}" cy="${s*.28}" r="${s*.05}" fill="${p.accent}"/>
                 <circle cx="${s*.72}" cy="${s*.28}" r="${s*.05}" fill="${p.accent}"/>`,
        eyes: `<circle cx="${s*.36}" cy="${s*.46}" r="${s*.08}" fill="${p.face}"/>
               <circle cx="${s*.64}" cy="${s*.46}" r="${s*.08}" fill="${p.face}"/>
               <circle cx="${s*.38}" cy="${s*.44}" r="${s*.03}" fill="${p.shine}"/>
               <circle cx="${s*.66}" cy="${s*.44}" r="${s*.03}" fill="${p.shine}"/>`,
        brows: `<path d="M${s*.28} ${s*.36} Q${s*.36} ${s*.32} ${s*.44} ${s*.36}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>
                <path d="M${s*.56} ${s*.36} Q${s*.64} ${s*.32} ${s*.72} ${s*.36}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>`,
        mouth: `<path d="M${s*.34} ${s*.65} Q${s*.5} ${s*.74} ${s*.66} ${s*.65}" stroke="${p.face}" stroke-width="${s*.028}" fill="none" stroke-linecap="round"/>
                <circle cx="${s*.42}" cy="${s*.67}" r="${s*.02}" fill="${p.accent}"/>
                <circle cx="${s*.58}" cy="${s*.67}" r="${s*.02}" fill="${p.accent}"/>`,
        beard: '',
      }),
      abdul_hai: (s, p) => ({
        head: `<rect x="${s*.12}" y="${s*.15}" width="${s*.76}" height="${s*.72}" rx="${s*.08}" fill="${p.bg}"/>`,
        extras: `<rect x="${s*.25}" y="${s*.08}" width="${s*.5}" height="${s*.12}" rx="${s*.04}" fill="${p.accent}"/>
                 <rect x="${s*.38}" y="${s*.02}" width="${s*.24}" height="${s*.08}" rx="${s*.03}" fill="${p.face}" opacity=".4"/>`,
        eyes: `<rect x="${s*.25}" y="${s*.38}" width="${s*.18}" height="${s*.14}" rx="${s*.04}" fill="${p.face}"/>
               <rect x="${s*.57}" y="${s*.38}" width="${s*.18}" height="${s*.14}" rx="${s*.04}" fill="${p.face}"/>
               <rect x="${s*.28}" y="${s*.4}" width="${s*.06}" height="${s*.06}" rx="${s*.02}" fill="${p.shine}"/>
               <rect x="${s*.6}" y="${s*.4}" width="${s*.06}" height="${s*.06}" rx="${s*.02}" fill="${p.shine}"/>`,
        brows: `<rect x="${s*.24}" y="${s*.32}" width="${s*.2}" height="${s*.04}" rx="${s*.02}" fill="${p.face}"/>
                <rect x="${s*.56}" y="${s*.32}" width="${s*.2}" height="${s*.04}" rx="${s*.02}" fill="${p.face}"/>`,
        mouth: `<rect x="${s*.34}" y="${s*.64}" width="${s*.32}" height="${s*.07}" rx="${s*.035}" fill="${p.face}"/>`,
        beard: `<path d="M${s*.3} ${s*.76} Q${s*.5} ${s*.88} ${s*.7} ${s*.76}" stroke="${p.face}" stroke-width="${s*.04}" fill="none" opacity=".3"/>`,
      }),
      rabiyah: (s, p) => ({
        head: `<circle cx="${s*.5}" cy="${s*.5}" r="${s*.42}" fill="${p.bg}"/>`,
        extras: `<path d="M${s*.18} ${s*.34} Q${s*.5} ${s*.1} ${s*.82} ${s*.34} L${s*.82} ${s*.28} Q${s*.5} ${s*.04} ${s*.18} ${s*.28} Z" fill="${p.accent}" opacity=".7"/>`,
        eyes: `<ellipse cx="${s*.36}" cy="${s*.46}" rx="${s*.06}" ry="${s*.08}" fill="${p.face}"/>
               <ellipse cx="${s*.64}" cy="${s*.46}" rx="${s*.06}" ry="${s*.08}" fill="${p.face}"/>
               <circle cx="${s*.375}" cy="${s*.44}" r="${s*.025}" fill="${p.shine}"/>
               <circle cx="${s*.655}" cy="${s*.44}" r="${s*.025}" fill="${p.shine}"/>`,
        brows: `<path d="M${s*.28} ${s*.36} Q${s*.36} ${s*.31} ${s*.44} ${s*.35}" stroke="${p.face}" stroke-width="${s*.02}" fill="none" stroke-linecap="round"/>
                <path d="M${s*.56} ${s*.35} Q${s*.64} ${s*.31} ${s*.72} ${s*.36}" stroke="${p.face}" stroke-width="${s*.02}" fill="none" stroke-linecap="round"/>`,
        mouth: `<path d="M${s*.36} ${s*.64} Q${s*.44} ${s*.7} ${s*.5} ${s*.68} Q${s*.56} ${s*.7} ${s*.64} ${s*.64}" stroke="${p.face}" stroke-width="${s*.025}" fill="none" stroke-linecap="round"/>`,
        beard: '',
      }),
      meher: (s, p) => ({

        eyes: `<ellipse cx="${s*.36}" cy="${s*.46}" rx="${s*.08}" ry="${s*.06}" fill="${p.face}"/>

               <circle cx="${s*.34}" cy="${s*.44}" r="${s*.025}" fill="${p.shine}"/>

        brows: `<path d="M${s*.27} ${s*.36} Q${s*.36} ${s*.31} ${s*.45} ${s*.35}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>
                <path d="M${s*.55} ${s*.35} Q${s*.64} ${s*.31} ${s*.73} ${s*.36}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>`,
        mouth: `<path d="M${s*.35} ${s*.64} Q${s*.5} ${s*.73} ${s*.65} ${s*.64}" stroke="${p.face}" stroke-width="${s*.028}" fill="none" stroke-linecap="round"/>`,

      }),
      aalia: (s, p) => ({
        head: `<circle cx="${s*.5}" cy="${s*.5}" r="${s*.42}" fill="${p.bg}"/>`,
        extras: `<circle cx="${s*.5}" cy="${s*.1}" r="${s*.08}" fill="${p.accent}"/>
                 <circle cx="${s*.34}" cy="${s*.14}" r="${s*.05}" fill="${p.accent}" opacity=".6"/>
                 <circle cx="${s*.66}" cy="${s*.14}" r="${s*.05}" fill="${p.accent}" opacity=".6"/>`,
        eyes: `<circle cx="${s*.36}" cy="${s*.46}" r="${s*.08}" fill="${p.face}"/>
               <circle cx="${s*.64}" cy="${s*.46}" r="${s*.08}" fill="${p.face}"/>
               <circle cx="${s*.34}" cy="${s*.43}" r="${s*.03}" fill="${p.shine}"/>
               <circle cx="${s*.62}" cy="${s*.43}" r="${s*.03}" fill="${p.shine}"/>`,
        brows: `<path d="M${s*.28} ${s*.35} Q${s*.36} ${s*.3} ${s*.44} ${s*.34}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>
                <path d="M${s*.56} ${s*.34} Q${s*.64} ${s*.3} ${s*.72} ${s*.35}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>`,
        mouth: `<path d="M${s*.36} ${s*.63} Q${s*.44} ${s*.7} ${s*.5} ${s*.68} Q${s*.56} ${s*.7} ${s*.64} ${s*.63}" stroke="${p.face}" stroke-width="${s*.025}" fill="none" stroke-linecap="round"/>`,
        beard: `<circle cx="${s*.5}" cy="${s*.73}" r="${s*.03}" fill="${p.accent}" opacity=".5"/>`,
      }),
      default: (s, p, seed) => {
        const eyeW = [0.07, 0.09, 0.06, 0.08][seed % 4];
        const smileDir = seed % 2 === 0 ? s*0.72 : s*0.65;
        const hatStyle = seed % 3;
        const hat = hatStyle === 0
          ? `<circle cx="${s*.5}" cy="${s*.09}" r="${s*.07}" fill="${p.accent}"/><line x1="${s*.5}" y1="${s*.16}" x2="${s*.5}" y2="${s*.24}" stroke="${p.accent}" stroke-width="${s*.025}"/>`
          : hatStyle === 1
          ? `<rect x="${s*.3}" y="${s*.06}" width="${s*.4}" height="${s*.12}" rx="${s*.04}" fill="${p.accent}" opacity=".7"/>`
          : `<polygon points="${s*.5},${s*.03} ${s*.38},${s*.18} ${s*.62},${s*.18}" fill="${p.accent}" opacity=".8"/>`;
        return {
          head: `<circle cx="${s*.5}" cy="${s*.5}" r="${s*.42}" fill="${p.bg}"/>`,
          extras: hat,
          eyes: `<ellipse cx="${s*.36}" cy="${s*.45}" rx="${eyeW}" ry="${eyeW*0.85}" fill="${p.face}"/>
                 <ellipse cx="${s*.64}" cy="${s*.45}" rx="${eyeW}" ry="${eyeW*0.85}" fill="${p.face}"/>
                 <circle cx="${s*.34}" cy="${s*.43}" r="${eyeW*0.35}" fill="${p.shine}"/>
                 <circle cx="${s*.62}" cy="${s*.43}" r="${eyeW*0.35}" fill="${p.shine}"/>`,
          brows: `<path d="M${s*.27} ${s*.34} Q${s*.36} ${s*.29} ${s*.45} ${s*.34}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>
                  <path d="M${s*.55} ${s*.34} Q${s*.64} ${s*.29} ${s*.73} ${s*.34}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>`,
          mouth: `<path d="M${s*.34} ${s*.63} Q${s*.5} ${smileDir} ${s*.66} ${s*.63}" stroke="${p.face}" stroke-width="${s*.028}" fill="none" stroke-linecap="round"/>`,
          beard: '',
        };
      }
    };

    function makeAvatar(memberId, size, paletteIdx) {
      const p = AVATAR_PALETTES[paletteIdx % AVATAR_PALETTES.length];
      const seed = memberId.split('').reduce((a,c) => a + c.charCodeAt(0), 0);
      const s = size;
      const r = size / 2;

      const faceFn = MEMBER_FACES[memberId] || ((sz, pal) => MEMBER_FACES.default(sz, pal, seed));
      const f = faceFn(s, p, seed);

      return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
        ${f.head}
        ${f.extras}
        ${f.brows}
        ${f.eyes}
        ${f.mouth}
        ${f.beard}
      </svg>`;
    }

    // ════════════════════════════════════════════
    // RENDERING ENGINE — pixel-accurate, RAF-driven
    // All positions stored in px. SVG lines read
    // from the same state object as nodes.
    // No getBoundingClientRect() — no drift.
    // ════════════════════════════════════════════

    const MEMBERS = TREE.rafiq.members;
    const FAMILY_RECIPES = RECIPES.rafiq;
    function getRecipes(id) { return FAMILY_RECIPES.filter(r => r.assignedTo === id); }

    const canvas = document.getElementById('treeCanvas');
    const svgEl  = document.getElementById('moleculeSvg');

    const NAV_H = 52; // px — matches top-nav height

    const NODE_SIZES = {
      rafiq_khan:64, mukhadis:64, abdul_hai:64, rabiyah:64,
      meher:82,      arshad:82,
      viq:58,        azhar:54,   athar:58,  ruksana:54,
      haana:72,      saara:68,   aalia:68,  farhan:54,
      kamran:50,     zuhair:50,  maha:50,
      izza:48,
    };

    // ── Family tree hierarchy positions ──
    // Gen 0 (grandparents): y=0.10
    // Gen 1 (parents+siblings): y=0.32
    // Gen 2 (our generation): y=0.58
    // Gen 3 (children): y=0.80
    // Couples placed side-by-side with small gap
    // Children spread evenly under parents
    const NODE_FRAC = {
      // Paternal grandparents (left cluster)
      rafiq_khan: { fx:0.22, fy:0.10 },
      mukhadis:   { fx:0.32, fy:0.10 },
      // Maternal grandparents (right cluster)
      abdul_hai:  { fx:0.64, fy:0.10 },
      rabiyah:    { fx:0.74, fy:0.10 },
      // Gen 1 — parents and their siblings
      viq:        { fx:0.10, fy:0.32 },   // Meher's brother
      meher:      { fx:0.34, fy:0.32 },   // Mother (Pervaaz side)
      arshad:     { fx:0.46, fy:0.32 },   // Father (Rafiq side)
      azhar:      { fx:0.60, fy:0.32 },   // Arshad's brother
      athar:      { fx:0.72, fy:0.32 },   // Arshad's brother
      ruksana:    { fx:0.82, fy:0.32 },   // Athar's wife
      // Gen 2 — children of Meher+Arshad
      haana:      { fx:0.28, fy:0.58 },
      saara:      { fx:0.40, fy:0.58 },
      aalia:      { fx:0.52, fy:0.58 },
      farhan:     { fx:0.50, fy:0.58 },   // Saara's husband — beside her
      // Gen 2 — Athar+Ruksana's kids
      kamran:     { fx:0.68, fy:0.58 },
      zuhair:     { fx:0.78, fy:0.58 },
      maha:       { fx:0.88, fy:0.58 },
      // Gen 3
      izza:       { fx:0.44, fy:0.80 },
    };

    // Live state: {id -> {x, y, size, el}}
    // x,y = CENTER of bubble in canvas-local px
    const nodeState = {};

    function initPositions() {
      const W = window.innerWidth;
      const H = window.innerHeight - 52;
      Object.keys(NODE_FRAC).forEach(id => {
        const f = NODE_FRAC[id];
        if (nodeState[id]) {
          // Already dragged — only reset on explicit resize
          return;
        }
        nodeState[id] = {
          x: f.fx * W,
          y: f.fy * H,
          size: NODE_SIZES[id] || 60,
        };
      });
    }

    function resetPositions() {
      Object.keys(nodeState).forEach(id => delete nodeState[id]);
      initPositions();
      Object.keys(nodeState).forEach(id => applyNodePosition(id));
    }

    // Apply nodeState position to DOM element
    function applyNodePosition(id) {
      const s = nodeState[id];
      if (!s || !s.el) return;
      s.el.style.left = (s.x - s.size / 2) + 'px';
      s.el.style.top  = (s.y - s.size / 2) + 'px';
    }

    // ── Family tree connections — typed for drawing elbow vs bar ──
    // type: 'couple' = horizontal bar between spouses
    //       'parent' = vertical drop from parent midpoint to child
    //       'descent' = from grandparent down to parent generation
    const CONNECTIONS = [
      // Grandparent couples (horizontal bar)
      { a:'rafiq_khan', b:'mukhadis',  type:'couple' },
      { a:'abdul_hai',  b:'rabiyah',   type:'couple' },
      // Descent from paternal grandparents to Meher+Viq
      { a:'rafiq_khan', b:'mukhadis',  to:'meher',   type:'descent' },
      { a:'rafiq_khan', b:'mukhadis',  to:'viq',     type:'descent' },
      // Descent from maternal grandparents to Arshad+siblings
      { a:'abdul_hai',  b:'rabiyah',   to:'arshad',  type:'descent' },
      { a:'abdul_hai',  b:'rabiyah',   to:'azhar',   type:'descent' },
      { a:'abdul_hai',  b:'rabiyah',   to:'athar',   type:'descent' },
      // Parent couple
      { a:'meher', b:'arshad', type:'couple' },
      // Athar+Ruksana couple
      { a:'athar', b:'ruksana', type:'couple' },
      // Saara+Farhan couple
      { a:'saara', b:'farhan', type:'couple' },
      // Meher+Arshad children
      { a:'meher', b:'arshad', to:'haana', type:'descent' },
      { a:'meher', b:'arshad', to:'saara', type:'descent' },
      { a:'meher', b:'arshad', to:'aalia', type:'descent' },
      // Athar+Ruksana children
      { a:'athar', b:'ruksana', to:'kamran', type:'descent' },
      { a:'athar', b:'ruksana', to:'zuhair', type:'descent' },
      { a:'athar', b:'ruksana', to:'maha',   type:'descent' },
      // Saara+Farhan child
      { a:'saara', b:'farhan', to:'izza', type:'descent' },
    ];


    function connKey(a,b) {
      return [a,b].sort().join('|');
    }
    function isCouple(a,b)  { return COUPLE_SET.has(connKey(a,b)); }

    // ── SVG drawing — proper family tree elbow lines ──
    // Redrawn every RAF frame from nodeState coordinates

    function buildSVGElements() {
      svgEl.innerHTML = ''; // cleared and rebuilt each frame
    }

    function drawFamilyTree() {
      svgEl.innerHTML = '';

      CONNECTIONS.forEach(conn => {
        const { a, b, to, type } = conn;
        const sa = nodeState[a];
        const sb = nodeState[b];

        if (!sa || !sb) return;

        if (type === 'couple') {
          // Horizontal bar between spouses — from right edge of left to left edge of right
          const leftNode  = sa.x < sb.x ? sa : sb;
          const rightNode = sa.x < sb.x ? sb : sa;
          const y = (leftNode.y + rightNode.y) / 2;
          const x1 = leftNode.x  + leftNode.size  / 2;
          const x2 = rightNode.x - rightNode.size / 2;

          const line = document.createElementNS('http://www.w3.org/2000/svg','line');
          line.setAttribute('x1', x1); line.setAttribute('y1', y);
          line.setAttribute('x2', x2); line.setAttribute('y2', y);
          line.setAttribute('stroke', 'rgba(196,120,90,0.7)');
          line.setAttribute('stroke-width', '1.5');
          svgEl.appendChild(line);

          // Small heart on couple bar
          const hx = (x1 + x2) / 2;
          const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
          txt.setAttribute('x', hx); txt.setAttribute('y', y - 4);
          txt.setAttribute('text-anchor','middle');
          txt.setAttribute('font-size','9');
          txt.setAttribute('font-family','Cormorant Garamond,serif');
          txt.setAttribute('fill','rgba(196,120,90,0.7)');
          txt.textContent = '♡';
          svgEl.appendChild(txt);

        } else if (type === 'descent' && to) {
          // Elbow line: from midpoint between couple, drop down to child
          const sc = nodeState[to];
          if (!sc) return;

          const coupleX = (sa.x + sb.x) / 2;
          const coupleY = Math.max(sa.y, sb.y); // bottom of couple row
          const parentBottom = coupleY + (nodeState[a].size / 2);
          const childTop     = sc.y - sc.size / 2;
          const midY = parentBottom + (childTop - parentBottom) * 0.5;

          // L-shaped elbow: vertical down from couple midpoint, horizontal to child, vertical to child
          const d = `M${coupleX},${parentBottom} L${coupleX},${midY} L${sc.x},${midY} L${sc.x},${childTop}`;
          const path = document.createElementNS('http://www.w3.org/2000/svg','path');
          path.setAttribute('d', d);
          path.setAttribute('fill','none');
          path.setAttribute('stroke','rgba(107,79,58,0.30)');
          path.setAttribute('stroke-width','1.2');
          path.setAttribute('stroke-linecap','round');
          path.setAttribute('stroke-linejoin','round');
          svgEl.appendChild(path);

          // Small dot where line meets child bubble
          const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
          dot.setAttribute('cx', sc.x); dot.setAttribute('cy', childTop);
          dot.setAttribute('r','2.5');
          dot.setAttribute('fill','rgba(196,120,90,0.45)');
          svgEl.appendChild(dot);
        }
      });

      requestAnimationFrame(drawFamilyTree);
    }

    // alias so existing call works
    function updateLines() { drawFamilyTree(); }

    // ── Build DOM nodes ──
    let paletteIdx = 0;
    Object.keys(NODE_FRAC).forEach(id => {
      const member = MEMBERS[id];
      if (!member) return;

      const size   = NODE_SIZES[id] || 60;
      const recipes = getRecipes(id);
      const isMe   = id === 'haana';

      const node = document.createElement('div');
      node.className = 'node' + (isMe ? ' active' : '');
      node.id = 'node-' + id;
      // Position via left/top directly (not transform %)
      node.style.position = 'absolute';
      node.style.left = '0px';
      node.style.top  = '0px';
      node.style.width  = size + 'px';
      node.style.height = size + 'px';
      node.style.cursor = 'grab';
      // Disable CSS float animation — we control position directly
      node.style.animation = 'none';

      node.innerHTML = `
        <div class="node-bubble" style="width:${size}px;height:${size}px;${isMe ? 'box-shadow:0 0 0 3px var(--clay);' : ''}">
          ${makeAvatar(id, size, paletteIdx)}
          ${recipes.length > 0 ? `<div class="node-recipe-badge">${recipes.length}</div>` : ''}
        </div>
        <div class="node-label" style="top:${size+5}px;">
          ${member.name}${isMe ? ' <span style="color:var(--clay);font-size:0.6rem;">· me</span>' : ''}
        </div>
        <div class="node-role" style="top:${size+20}px;">
          ${member.role}
        </div>
      `;

      canvas.appendChild(node);
      nodeState[id] = nodeState[id] || { x:0, y:0, size };
      nodeState[id].el   = node;
      nodeState[id].size = size;

      // ── Drag logic (mouse + touch) ──
      let dragging = false;
      let dragOffX = 0, dragOffY = 0;
      let didDrag  = false;

      function startDrag(clientX, clientY) {
        dragging = true;
        didDrag  = false;
        const s  = nodeState[id];
        // clientX/Y are viewport coords; nodeState is canvas-local
        // canvas starts at (0, 52) in viewport
        dragOffX = clientX - s.x;
        dragOffY = (clientY - 52) - s.y;
        node.style.cursor = 'grabbing';
        node.style.zIndex = '50';
      }

      function moveDrag(clientX, clientY) {
        if (!dragging) return;
        didDrag = true;
        const s  = nodeState[id];
        const W  = window.innerWidth;
        const H  = window.innerHeight - 52;
        const nx = clientX - dragOffX;
        const ny = (clientY - 52) - dragOffY;
        // Clamp so bubble stays within canvas
        s.x = Math.max(s.size/2, Math.min(W - s.size/2, nx));
        s.y = Math.max(s.size/2, Math.min(H - s.size/2, ny));
        node.style.left = (s.x - s.size/2) + 'px';
        node.style.top  = (s.y - s.size/2) + 'px';
      }

      function endDrag() {
        if (!dragging) return;
        dragging = false;
        node.style.cursor = 'grab';
        node.style.zIndex = '';
      }

      // Mouse
      node.addEventListener('mousedown', e => {
        if (e.button !== 0) return;
        e.preventDefault();
        startDrag(e.clientX, e.clientY);
      });
      window.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
      window.addEventListener('mouseup', e => {
        if (dragging && !didDrag) {
          endDrag();
          showPanel(id, node);
        } else {
          endDrag();
        }
      });

      // Touch
      node.addEventListener('touchstart', e => {
        const t = e.touches[0];
        startDrag(t.clientX, t.clientY);
      }, { passive: true });
      node.addEventListener('touchmove', e => {
        const t = e.touches[0];
        moveDrag(t.clientX, t.clientY);
        if (didDrag) e.preventDefault();
      }, { passive: false });
      node.addEventListener('touchend', e => {
        if (!didDrag) showPanel(id, node);
        endDrag();
      });

      // Click (non-drag)
      node.addEventListener('click', e => {
        if (didDrag) { didDrag = false; return; }
        e.stopPropagation();
        showPanel(id, node);
      });

      paletteIdx++;
    });

    // ── Wait for paint before placing nodes ──

    function placeNodes() {
      const W = window.innerWidth;
      const H = window.innerHeight - 52;
      Object.keys(NODE_FRAC).forEach(id => {
        const f = NODE_FRAC[id];
        const s = nodeState[id];
        if (!s) return;
        s.x = f.fx * W;
        s.y = f.fy * H;
        applyNodePosition(id);
      });
    }

    // Double RAF: first frame starts paint, second frame has real layout dimensions
    requestAnimationFrame(() => requestAnimationFrame(() => {
      placeNodes();
      requestAnimationFrame(drawFamilyTree);
    }));

    window.addEventListener('resize', placeNodes);

    // ── Highlight panel ──
    let openPanel = null;

    function showPanel(memberId, nodeEl) {
      // Close existing
      if (openPanel) { openPanel.remove(); openPanel = null; }
      document.querySelectorAll('.node.active').forEach(n => {
        if (n.id !== 'node-haana') n.classList.remove('active');
      });

      nodeEl.classList.add('active');

      const member  = MEMBERS[memberId];
      const recipes = getRecipes(memberId);

      const panel = document.createElement('div');
      panel.className = 'highlight-panel';

      const avatarSvg = makeAvatar(memberId, 36, Array.from(canvas.querySelectorAll('.node')).findIndex(n => n.id === 'node-' + memberId));

      let recipeHTML = '';
      if (recipes.length > 0) {
        recipeHTML = `
          <ul class="hp-recipes-preview">
            ${recipes.slice(0,4).map(r => `<li>${r.title}</li>`).join('')}
            ${recipes.length > 4 ? `<li style="opacity:0.4;font-style:italic;">+${recipes.length-4} more…</li>` : ''}
          </ul>
          <p class="hp-note">
            ${MEMBERS[recipes[0].uploadedBy]?.name || 'Someone'} added ${recipes.length} recipe${recipes.length>1?'s':''} · ${formatDate(recipes[0].uploadDate)}
          </p>`;
      } else {
        recipeHTML = `<p class="hp-empty">No recipes yet.</p>`;
      }

      panel.innerHTML = `
        <button class="hp-close" onclick="closePanel()">✕</button>
        <div class="hp-inner">
          <div class="hp-head">
            ${avatarSvg}
            <div>
              <div class="hp-name">${member.name}</div>
              <div class="hp-role-tag">${member.role}</div>
            </div>
          </div>
          ${recipeHTML}
          <a class="hp-cta" href="recipe.html?member=${memberId}">
            Open ${member.name}'s Recipes →
          </a>
        </div>
      `;

      document.body.appendChild(panel);
      openPanel = panel;

      // Position near node
      const rect = nodeEl.getBoundingClientRect();
      let left = rect.right + 12;
      let top  = rect.top;
      if (left + 235 > window.innerWidth - 10) left = rect.left - 242;
      if (left < 8) left = 8;
      if (top + 320 > window.innerHeight - 10) top = window.innerHeight - 325;
      panel.style.left = left + 'px';
      panel.style.top  = top + 'px';
    }

    function closePanel() {
      if (openPanel) { openPanel.remove(); openPanel = null; }
      document.querySelectorAll('.node.active').forEach(n => {
        if (n.id !== 'node-haana') n.classList.remove('active');
      });
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.node') && !e.target.closest('.highlight-panel')) closePanel();
    });

    function formatDate(d) {
      return new Date(d).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast'; t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3200);
    }
  </script>
</body>
</html>
