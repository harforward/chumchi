<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chumchi — Family Tree</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FDF6EC; --blush: #F2C4B0; --sage: #C8D8C0;
      --saffron: #F0C070; --lilac: #D4C0D8; --clay: #C4785A;
      --bark: #6B4F3A; --ink: #2C2118; --white: #FFFFFF;
    }

    body {
      background: #FFFFFF;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ══ TOP NAV ══ */
    .top-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(107,79,58,0.08);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      z-index: 100;
      gap: 1rem;
    }

    .nav-hamburger {
      width: 36px; height: 36px;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .nav-hamburger:hover { background: rgba(107,79,58,0.06); }
    .nav-hamburger span {
      display: block;
      height: 1.5px;
      background: var(--bark);
      border-radius: 2px;
      transition: all 0.25s;
    }

    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--bark);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .nav-brand svg { width: 12px; opacity: 0.6; }

    .nav-tree-label {
      margin-left: auto;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--bark);
      opacity: 0.35;
    }

    /* ══ SIDEBAR ══ */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 240px;
      height: 100vh;
      background: rgba(107,79,58,0.96);
      backdrop-filter: blur(12px);
      z-index: 200;
      transform: translateX(-100%);
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
      padding: 1.5rem 0;
      box-shadow: 4px 0 32px rgba(44,33,24,0.18);
    }

    .sidebar.open { transform: translateX(0); }

    .sidebar-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none; border: none;
      color: rgba(253,246,236,0.5);
      font-size: 1.1rem;
      cursor: pointer;
      transition: color 0.2s;
    }
    .sidebar-close:hover { color: rgba(253,246,236,0.9); }

    .sidebar-brand {
      padding: 0 1.5rem 1.5rem;
      border-bottom: 1px solid rgba(253,246,236,0.1);
      margin-bottom: 0.5rem;
    }

    .sidebar-brand span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(253,246,236,0.9);
    }

    .sidebar-brand small {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.72rem;
      color: rgba(240,192,112,0.7);
      letter-spacing: 0.1em;
      margin-top: 0.1rem;
    }

    .sidebar-nav { flex: 1; padding: 0.5rem 0; }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.75rem 1.5rem;
      color: rgba(253,246,236,0.65);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: 'Inter', sans-serif;
    }

    .sidebar-item:hover,
    .sidebar-item.active {
      color: rgba(253,246,236,0.95);
      background: rgba(253,246,236,0.08);
    }

    .sidebar-item .icon {
      font-size: 0.95rem;
      width: 18px;
      text-align: center;
      opacity: 0.7;
    }

    .sidebar-section {
      padding: 0.5rem 1.5rem 0.25rem;
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(253,246,236,0.25);
      margin-top: 0.5rem;
    }

    .sidebar-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid rgba(253,246,236,0.1);
    }

    .sidebar-footer button {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(253,246,236,0.35);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: color 0.2s;
    }
    .sidebar-footer button:hover { color: rgba(253,246,236,0.7); }

    /* Sidebar overlay */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,33,24,0.3);
      z-index: 199;
    }
    .sidebar-overlay.open { display: block; }

    /* ══ MOLECULE CANVAS ══ */
    .tree-canvas {
      position: relative;
      width: 100%;
      min-height: 100vh;
      padding-top: 52px;
    }

    #moleculeSvg {
      position: absolute;
      top: 52px; left: 0;
      width: 100%; height: calc(100% - 52px);
      pointer-events: none;
      z-index: 1;
    }

    /* ══ BUBBLE NODES ══ */
    .node {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      z-index: 10;
      user-select: none;
    }

    .node-bubble {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    }

    .node:hover .node-bubble { transform: scale(1.1); }
    .node.active .node-bubble { transform: scale(1.12); }

    /* Pulsing paisley glow */
    .node-bubble::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        rgba(196,120,90,0.0),
        rgba(240,192,112,0.35),
        rgba(212,192,216,0.25),
        rgba(200,216,192,0.3),
        rgba(242,196,176,0.35),
        rgba(196,120,90,0.0)
      );
      animation: paisleyPulse 3.5s ease-in-out infinite;
      z-index: -1;
      filter: blur(3px);
    }

    @keyframes paisleyPulse {
      0%,100% { opacity: 0.4; transform: scale(0.95) rotate(0deg); }
      50%      { opacity: 1;   transform: scale(1.12) rotate(180deg); }
    }

    /* Floating drift */
    .node { animation: drift 6s ease-in-out infinite; }
    .node:nth-child(2n)   { animation-duration: 7.2s; animation-delay: -1.2s; }
    .node:nth-child(3n)   { animation-duration: 5.8s; animation-delay: -2.4s; }
    .node:nth-child(4n)   { animation-duration: 8.1s; animation-delay: -0.8s; }
    .node:nth-child(5n)   { animation-duration: 6.6s; animation-delay: -3.1s; }

    @keyframes drift {
      0%,100% { margin-top: 0px; }
      50%      { margin-top: -8px; }
    }

    .node-label {
      margin-top: 8px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      color: var(--bark);
      text-align: center;
      line-height: 1.2;
      white-space: nowrap;
    }

    .node-role {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--clay);
      opacity: 0.65;
    }

    .node-recipe-badge {
      position: absolute;
      top: -4px; right: -4px;
      background: var(--saffron);
      color: var(--bark);
      font-size: 0.52rem;
      font-weight: 700;
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #fff;
      z-index: 2;
    }

    /* ══ HIGHLIGHT PANEL (click 1) ══ */
    .highlight-panel {
      position: fixed;
      z-index: 300;
      background: rgba(255,255,255,0.97);
      border-radius: 0;
      width: 230px;
      box-shadow: 0 8px 40px rgba(107,79,58,0.16);
      animation: panelIn 0.2s ease;
      border-top: 2px solid var(--clay);
    }

    /* Bracket corners on panel */
    .highlight-panel::before,
    .highlight-panel::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-color: var(--clay);
      border-style: solid;
    }
    .highlight-panel::before { bottom: -1px; left: -1px; border-width: 0 0 1px 1px; }
    .highlight-panel::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(6px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .hp-inner { padding: 1.2rem 1.3rem; }

    .hp-head {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 0.8rem;
    }

    .hp-avatar-sm {
      width: 36px; height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .hp-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--bark);
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .hp-role-tag {
      font-size: 0.58rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--clay);
    }

    .hp-recipes-preview {
      list-style: none;
      margin-bottom: 0.9rem;
    }

    .hp-recipes-preview li {
      font-size: 0.76rem;
      color: var(--ink);
      padding: 0.22rem 0;
      border-bottom: 1px solid rgba(107,79,58,0.05);
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .hp-recipes-preview li::before {
      content: '';
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--clay);
      opacity: 0.5;
      flex-shrink: 0;
    }

    .hp-empty {
      font-size: 0.73rem;
      font-style: italic;
      color: var(--bark);
      opacity: 0.35;
      margin-bottom: 0.9rem;
    }

    .hp-note {
      font-size: 0.63rem;
      color: var(--clay);
      opacity: 0.65;
      font-style: italic;
      margin-bottom: 0.9rem;
      line-height: 1.5;
    }

    .hp-cta {
      display: block;
      width: 100%;
      padding: 0.65rem;
      background: var(--bark);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .hp-cta:hover { background: var(--clay); }

    .hp-close {
      position: absolute;
      top: 0.5rem; right: 0.6rem;
      background: none; border: none;
      font-size: 0.85rem;
      color: var(--bark); opacity: 0.3;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .hp-close:hover { opacity: 0.8; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      background: var(--bark);
      color: var(--cream);
      padding: 0.75rem 1.3rem;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      z-index: 999;
      animation: toastIn 0.28s ease;
      box-shadow: 0 4px 20px rgba(107,79,58,0.25);
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .node { animation: none; }
      .node-bubble::before { animation: none; }
    }
  </style>
</head>
<body>

  <!-- Sidebar overlay -->
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-close" onclick="closeSidebar()">✕</button>

    <div class="sidebar-brand">
      <span>Chumchi</span>
      <small>silver spoon energy</small>
    </div>

    <nav class="sidebar-nav">
      <span class="sidebar-section">Navigate</span>
      <a class="sidebar-item active" href="tree.html">
        <span class="icon">◉</span> Family Tree
      </a>
      <a class="sidebar-item" href="#" onclick="showFamilyList()">
        <span class="icon">◎</span> Family List
      </a>
      <a class="sidebar-item" href="upload.html">
        <span class="icon">↑</span> Upload Recipe
      </a>

      <span class="sidebar-section">My Recipes</span>
      <a class="sidebar-item" href="recipe.html?member=meher">
        <span class="icon">☽</span> Meher
      </a>
      <a class="sidebar-item" href="recipe.html?member=viq">
        <span class="icon">☽</span> Viq
      </a>

      <span class="sidebar-section">Admin</span>
      <a class="sidebar-item" href="../admin/family-admin.html">
        <span class="icon">⊡</span> Manage Tree
      </a>
    </nav>

    <div class="sidebar-footer">
      <button onclick="logout()">Sign Out</button>
    </div>
  </div>

  <!-- Top nav -->
  <nav class="top-nav">
    <button class="nav-hamburger" id="hamburger" onclick="openSidebar()">
      <span></span><span></span><span></span>
    </button>
    <a href="tree.html" class="nav-brand">
      <svg viewBox="0 0 24 60" fill="none"><ellipse cx="12" cy="10" rx="7" ry="9" stroke="#6B4F3A" stroke-width="1.3"/><line x1="12" y1="19" x2="12" y2="58" stroke="#6B4F3A" stroke-width="1.3" stroke-linecap="round"/></svg>
      Chumchi
    </a>
    <span class="nav-tree-label">The Rafiq Tree</span>
  </nav>

  <!-- SVG connectors -->
  <svg id="moleculeSvg" xmlns="http://www.w3.org/2000/svg"></svg>

  <!-- Tree canvas -->
  <div class="tree-canvas" id="treeCanvas"></div>

  <script src="../assets/app.js"></script>
  <script>

    // ── Auth ──
    if (sessionStorage.getItem('chumchi_site') !== 'true') window.location.href = '../index.html';
    const sess = JSON.parse(sessionStorage.getItem('chumchi_session') || 'null');
    if (!sess) window.location.href = '../platform/login.html';

    // ── Sidebar ──
    function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
    function logout()       { sessionStorage.clear(); window.location.href = '../index.html'; }

    function showFamilyList() {
      closeSidebar();
      showToast('Family List — coming soon');
    }

    // ── Expressive Robot Avatar Generator ──
    const AVATAR_PALETTES = [
      { bg: '#F2C4B0', face: '#6B4F3A', accent: '#F0C070', shine: '#fff8f0' },
      { bg: '#C8D8C0', face: '#2C4A2C', accent: '#F2C4B0', shine: '#f0fff0' },
      { bg: '#D4C0D8', face: '#4A2C6B', accent: '#F0C070', shine: '#fdf0ff' },
      { bg: '#F0C070', face: '#5A3A0A', accent: '#D4C0D8', shine: '#fffdf0' },
      { bg: '#E8D5C0', face: '#4A3020', accent: '#C4785A', shine: '#fff8f0' },
      { bg: '#C4785A', face: '#FDF6EC', accent: '#F0C070', shine: '#fff0e8' },
      { bg: '#B8D4C8', face: '#1A3A2A', accent: '#F2C4B0', shine: '#f0fff8' },
      { bg: '#E0C8D8', face: '#3A1A3A', accent: '#F0C070', shine: '#fff0f8' },
      { bg: '#D8E0C8', face: '#2A3A1A', accent: '#C4785A', shine: '#f8fff0' },
      { bg: '#C8D0E8', face: '#1A2A4A', accent: '#F2C4B0', shine: '#f0f0ff' },
    ];

    // Fully hand-crafted unique face per member
    const MEMBER_FACES = {
      rafiq_khan: (s, p) => ({
        head: `<rect x="${s*.1}" y="${s*.18}" width="${s*.8}" height="${s*.68}" rx="${s*.12}" fill="${p.bg}"/>`,
        extras: `<rect x="${s*.3}" y="${s*.06}" width="${s*.4}" height="${s*.16}" rx="${s*.04}" fill="${p.accent}"/>
                 <circle cx="${s*.5}" cy="${s*.06}" r="${s*.05}" fill="${p.face}" opacity=".5"/>`,
        eyes: `<ellipse cx="${s*.34}" cy="${s*.44}" rx="${s*.08}" ry="${s*.1}" fill="${p.face}"/>
               <ellipse cx="${s*.66}" cy="${s*.44}" rx="${s*.08}" ry="${s*.1}" fill="${p.face}"/>
               <circle cx="${s*.36}" cy="${s*.42}" r="${s*.03}" fill="${p.shine}"/>
               <circle cx="${s*.68}" cy="${s*.42}" r="${s*.03}" fill="${p.shine}"/>`,
        brows: `<path d="M${s*.26} ${s*.33} Q${s*.34} ${s*.28} ${s*.42} ${s*.33}" stroke="${p.face}" stroke-width="${s*.025}" fill="none" stroke-linecap="round"/>
                <path d="M${s*.58} ${s*.33} Q${s*.66} ${s*.28} ${s*.74} ${s*.33}" stroke="${p.face}" stroke-width="${s*.025}" fill="none" stroke-linecap="round"/>`,
        mouth: `<path d="M${s*.32} ${s*.68} Q${s*.5} ${s*.78} ${s*.68} ${s*.68}" stroke="${p.face}" stroke-width="${s*.03}" fill="none" stroke-linecap="round"/>`,
        beard: `<ellipse cx="${s*.5}" cy="${s*.8}" rx="${s*.18}" ry="${s*.06}" fill="${p.face}" opacity=".25"/>`,
      }),
      mukhadis: (s, p) => ({
        head: `<circle cx="${s*.5}" cy="${s*.5}" r="${s*.42}" fill="${p.bg}"/>`,
        extras: `<path d="M${s*.2} ${s*.28} Q${s*.5} ${s*.05} ${s*.8} ${s*.28}" stroke="${p.accent}" stroke-width="${s*.05}" fill="none"/>
                 <circle cx="${s*.28}" cy="${s*.28}" r="${s*.05}" fill="${p.accent}"/>
                 <circle cx="${s*.72}" cy="${s*.28}" r="${s*.05}" fill="${p.accent}"/>`,
        eyes: `<circle cx="${s*.36}" cy="${s*.46}" r="${s*.08}" fill="${p.face}"/>
               <circle cx="${s*.64}" cy="${s*.46}" r="${s*.08}" fill="${p.face}"/>
               <circle cx="${s*.38}" cy="${s*.44}" r="${s*.03}" fill="${p.shine}"/>
               <circle cx="${s*.66}" cy="${s*.44}" r="${s*.03}" fill="${p.shine}"/>`,
        brows: `<path d="M${s*.28} ${s*.36} Q${s*.36} ${s*.32} ${s*.44} ${s*.36}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>
                <path d="M${s*.56} ${s*.36} Q${s*.64} ${s*.32} ${s*.72} ${s*.36}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>`,
        mouth: `<path d="M${s*.34} ${s*.65} Q${s*.5} ${s*.74} ${s*.66} ${s*.65}" stroke="${p.face}" stroke-width="${s*.028}" fill="none" stroke-linecap="round"/>
                <circle cx="${s*.42}" cy="${s*.67}" r="${s*.02}" fill="${p.accent}"/>
                <circle cx="${s*.58}" cy="${s*.67}" r="${s*.02}" fill="${p.accent}"/>`,
        beard: '',
      }),
      abdul_hai: (s, p) => ({
        head: `<rect x="${s*.12}" y="${s*.15}" width="${s*.76}" height="${s*.72}" rx="${s*.08}" fill="${p.bg}"/>`,
        extras: `<rect x="${s*.25}" y="${s*.08}" width="${s*.5}" height="${s*.12}" rx="${s*.04}" fill="${p.accent}"/>
                 <rect x="${s*.38}" y="${s*.02}" width="${s*.24}" height="${s*.08}" rx="${s*.03}" fill="${p.face}" opacity=".4"/>`,
        eyes: `<rect x="${s*.25}" y="${s*.38}" width="${s*.18}" height="${s*.14}" rx="${s*.04}" fill="${p.face}"/>
               <rect x="${s*.57}" y="${s*.38}" width="${s*.18}" height="${s*.14}" rx="${s*.04}" fill="${p.face}"/>
               <rect x="${s*.28}" y="${s*.4}" width="${s*.06}" height="${s*.06}" rx="${s*.02}" fill="${p.shine}"/>
               <rect x="${s*.6}" y="${s*.4}" width="${s*.06}" height="${s*.06}" rx="${s*.02}" fill="${p.shine}"/>`,
        brows: `<rect x="${s*.24}" y="${s*.32}" width="${s*.2}" height="${s*.04}" rx="${s*.02}" fill="${p.face}"/>
                <rect x="${s*.56}" y="${s*.32}" width="${s*.2}" height="${s*.04}" rx="${s*.02}" fill="${p.face}"/>`,
        mouth: `<rect x="${s*.34}" y="${s*.64}" width="${s*.32}" height="${s*.07}" rx="${s*.035}" fill="${p.face}"/>`,
        beard: `<path d="M${s*.3} ${s*.76} Q${s*.5} ${s*.88} ${s*.7} ${s*.76}" stroke="${p.face}" stroke-width="${s*.04}" fill="none" opacity=".3"/>`,
      }),
      rabiyah: (s, p) => ({
        head: `<circle cx="${s*.5}" cy="${s*.5}" r="${s*.42}" fill="${p.bg}"/>`,
        extras: `<path d="M${s*.18} ${s*.34} Q${s*.5} ${s*.1} ${s*.82} ${s*.34} L${s*.82} ${s*.28} Q${s*.5} ${s*.04} ${s*.18} ${s*.28} Z" fill="${p.accent}" opacity=".7"/>`,
        eyes: `<ellipse cx="${s*.36}" cy="${s*.46}" rx="${s*.06}" ry="${s*.08}" fill="${p.face}"/>
               <ellipse cx="${s*.64}" cy="${s*.46}" rx="${s*.06}" ry="${s*.08}" fill="${p.face}"/>
               <circle cx="${s*.375}" cy="${s*.44}" r="${s*.025}" fill="${p.shine}"/>
               <circle cx="${s*.655}" cy="${s*.44}" r="${s*.025}" fill="${p.shine}"/>`,
        brows: `<path d="M${s*.28} ${s*.36} Q${s*.36} ${s*.31} ${s*.44} ${s*.35}" stroke="${p.face}" stroke-width="${s*.02}" fill="none" stroke-linecap="round"/>
                <path d="M${s*.56} ${s*.35} Q${s*.64} ${s*.31} ${s*.72} ${s*.36}" stroke="${p.face}" stroke-width="${s*.02}" fill="none" stroke-linecap="round"/>`,
        mouth: `<path d="M${s*.36} ${s*.64} Q${s*.44} ${s*.7} ${s*.5} ${s*.68} Q${s*.56} ${s*.7} ${s*.64} ${s*.64}" stroke="${p.face}" stroke-width="${s*.025}" fill="none" stroke-linecap="round"/>`,
        beard: '',
      }),
      meher: (s, p) => ({
        head: `<circle cx="${s*.5}" cy="${s*.5}" r="${s*.42}" fill="${p.bg}"/>`,
        extras: `<path d="M${s*.2} ${s*.3} Q${s*.3} ${s*.08} ${s*.5} ${s*.1} Q${s*.7} ${s*.08} ${s*.8} ${s*.3}" fill="${p.accent}" opacity=".55"/>
                 <circle cx="${s*.32}" cy="${s*.18}" r="${s*.04}" fill="${p.accent}"/>
                 <circle cx="${s*.68}" cy="${s*.18}" r="${s*.04}" fill="${p.accent}"/>`,
        eyes: `<ellipse cx="${s*.36}" cy="${s*.45}" rx="${s*.09}" ry="${s*.07}" fill="${p.face}"/>
               <ellipse cx="${s*.64}" cy="${s*.45}" rx="${s*.09}" ry="${s*.07}" fill="${p.face}"/>
               <ellipse cx="${s*.34}" cy="${s*.43}" rx="${s*.04}" ry="${s*.03}" fill="${p.shine}"/>
               <ellipse cx="${s*.62}" cy="${s*.43}" rx="${s*.04}" ry="${s*.03}" fill="${p.shine}"/>`,
        brows: `<path d="M${s*.27} ${s*.34} Q${s*.36} ${s*.29} ${s*.45} ${s*.34}" stroke="${p.face}" stroke-width="${s*.025}" fill="none" stroke-linecap="round"/>
                <path d="M${s*.55} ${s*.34} Q${s*.64} ${s*.29} ${s*.73} ${s*.34}" stroke="${p.face}" stroke-width="${s*.025}" fill="none" stroke-linecap="round"/>`,
        mouth: `<path d="M${s*.33} ${s*.63} Q${s*.42} ${s*.72} ${s*.5} ${s*.7} Q${s*.58} ${s*.72} ${s*.67} ${s*.63}" stroke="${p.face}" stroke-width="${s*.03}" fill="rgba(196,120,90,.2)" stroke-linecap="round"/>`,
        beard: `<circle cx="${s*.42}" cy="${s*.66}" r="${s*.025}" fill="${p.accent}" opacity=".6"/>
                <circle cx="${s*.58}" cy="${s*.66}" r="${s*.025}" fill="${p.accent}" opacity=".6"/>`,
      }),
      arshad: (s, p) => ({
        head: `<rect x="${s*.1}" y="${s*.16}" width="${s*.8}" height="${s*.7}" rx="${s*.1}" fill="${p.bg}"/>`,
        extras: `<rect x="${s*.2}" y="${s*.06}" width="${s*.6}" height="${s*.14}" rx="${s*.06}" fill="${p.accent}"/>
                 <circle cx="${s*.35}" cy="${s*.07}" r="${s*.04}" fill="${p.face}" opacity=".4"/>
                 <circle cx="${s*.5}" cy="${s*.05}" r="${s*.04}" fill="${p.face}" opacity=".4"/>
                 <circle cx="${s*.65}" cy="${s*.07}" r="${s*.04}" fill="${p.face}" opacity=".4"/>`,
        eyes: `<rect x="${s*.24}" y="${s*.36}" width="${s*.2}" height="${s*.16}" rx="${s*.06}" fill="${p.face}"/>
               <rect x="${s*.56}" y="${s*.36}" width="${s*.2}" height="${s*.16}" rx="${s*.06}" fill="${p.face}"/>
               <circle cx="${s*.28}" cy="${s*.39}" r="${s*.035}" fill="${p.shine}"/>
               <circle cx="${s*.6}" cy="${s*.39}" r="${s*.035}" fill="${p.shine}"/>`,
        brows: `<rect x="${s*.23}" y="${s*.29}" width="${s*.22}" height="${s*.05}" rx="${s*.025}" fill="${p.face}"/>
                <rect x="${s*.55}" y="${s*.29}" width="${s*.22}" height="${s*.05}" rx="${s*.025}" fill="${p.face}"/>`,
        mouth: `<path d="M${s*.3} ${s*.66} L${s*.7} ${s*.66}" stroke="${p.face}" stroke-width="${s*.04}" stroke-linecap="round"/>
                <path d="M${s*.36} ${s*.72} L${s*.64} ${s*.72}" stroke="${p.face}" stroke-width="${s*.025}" stroke-linecap="round" opacity=".35"/>`,
        beard: `<rect x="${s*.28}" y="${s*.73}" width="${s*.44}" height="${s*.1}" rx="${s*.05}" fill="${p.face}" opacity=".2"/>`,
      }),
      haana: (s, p) => ({
        head: `<circle cx="${s*.5}" cy="${s*.5}" r="${s*.42}" fill="${p.bg}"/>`,
        extras: `<path d="M${s*.25} ${s*.26} Q${s*.5} ${s*.08} ${s*.75} ${s*.26}" fill="${p.accent}" opacity=".5"/>
                 <circle cx="${s*.5}" cy="${s*.1}" r="${s*.06}" fill="${p.accent}"/>
                 <line x1="${s*.5}" y1="${s*.16}" x2="${s*.5}" y2="${s*.26}" stroke="${p.accent}" stroke-width="${s*.025}"/>`,
        eyes: `<circle cx="${s*.36}" cy="${s*.45}" r="${s*.09}" fill="${p.face}"/>
               <circle cx="${s*.64}" cy="${s*.45}" r="${s*.09}" fill="${p.face}"/>
               <circle cx="${s*.33}" cy="${s*.42}" r="${s*.04}" fill="${p.shine}"/>
               <circle cx="${s*.61}" cy="${s*.42}" r="${s*.04}" fill="${p.shine}"/>
               <circle cx="${s*.39}" cy="${s*.48}" r="${s*.015}" fill="${p.accent}" opacity=".7"/>
               <circle cx="${s*.67}" cy="${s*.48}" r="${s*.015}" fill="${p.accent}" opacity=".7"/>`,
        brows: `<path d="M${s*.27} ${s*.33} Q${s*.36} ${s*.27} ${s*.45} ${s*.32}" stroke="${p.face}" stroke-width="${s*.024}" fill="none" stroke-linecap="round"/>
                <path d="M${s*.55} ${s*.32} Q${s*.64} ${s*.27} ${s*.73} ${s*.33}" stroke="${p.face}" stroke-width="${s*.024}" fill="none" stroke-linecap="round"/>`,
        mouth: `<path d="M${s*.32} ${s*.63} Q${s*.5} ${s*.75} ${s*.68} ${s*.63}" stroke="${p.face}" stroke-width="${s*.032}" fill="rgba(196,120,90,.15)" stroke-linecap="round"/>`,
        beard: `<circle cx="${s*.36}" cy="${s*.45}" r="${s*.03}" fill="${p.accent}" opacity=".4"/>
                <circle cx="${s*.64}" cy="${s*.45}" r="${s*.03}" fill="${p.accent}" opacity=".4"/>`,
      }),
      saara: (s, p) => ({
        head: `<circle cx="${s*.5}" cy="${s*.5}" r="${s*.42}" fill="${p.bg}"/>`,
        extras: `<path d="M${s*.18} ${s*.3} Q${s*.26} ${s*.1} ${s*.5} ${s*.08} Q${s*.74} ${s*.1} ${s*.82} ${s*.3} L${s*.82} ${s*.24} Q${s*.5} ${s*.02} ${s*.18} ${s*.24} Z" fill="${p.accent}" opacity=".6"/>`,
        eyes: `<ellipse cx="${s*.36}" cy="${s*.46}" rx="${s*.08}" ry="${s*.06}" fill="${p.face}"/>
               <ellipse cx="${s*.64}" cy="${s*.46}" rx="${s*.08}" ry="${s*.06}" fill="${p.face}"/>
               <circle cx="${s*.34}" cy="${s*.44}" r="${s*.025}" fill="${p.shine}"/>
               <circle cx="${s*.62}" cy="${s*.44}" r="${s*.025}" fill="${p.shine}"/>`,
        brows: `<path d="M${s*.27} ${s*.36} Q${s*.36} ${s*.31} ${s*.45} ${s*.35}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>
                <path d="M${s*.55} ${s*.35} Q${s*.64} ${s*.31} ${s*.73} ${s*.36}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>`,
        mouth: `<path d="M${s*.35} ${s*.64} Q${s*.5} ${s*.73} ${s*.65} ${s*.64}" stroke="${p.face}" stroke-width="${s*.028}" fill="none" stroke-linecap="round"/>`,
        beard: '',
      }),
      aalia: (s, p) => ({
        head: `<circle cx="${s*.5}" cy="${s*.5}" r="${s*.42}" fill="${p.bg}"/>`,
        extras: `<circle cx="${s*.5}" cy="${s*.1}" r="${s*.08}" fill="${p.accent}"/>
                 <circle cx="${s*.34}" cy="${s*.14}" r="${s*.05}" fill="${p.accent}" opacity=".6"/>
                 <circle cx="${s*.66}" cy="${s*.14}" r="${s*.05}" fill="${p.accent}" opacity=".6"/>`,
        eyes: `<circle cx="${s*.36}" cy="${s*.46}" r="${s*.08}" fill="${p.face}"/>
               <circle cx="${s*.64}" cy="${s*.46}" r="${s*.08}" fill="${p.face}"/>
               <circle cx="${s*.34}" cy="${s*.43}" r="${s*.03}" fill="${p.shine}"/>
               <circle cx="${s*.62}" cy="${s*.43}" r="${s*.03}" fill="${p.shine}"/>`,
        brows: `<path d="M${s*.28} ${s*.35} Q${s*.36} ${s*.3} ${s*.44} ${s*.34}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>
                <path d="M${s*.56} ${s*.34} Q${s*.64} ${s*.3} ${s*.72} ${s*.35}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>`,
        mouth: `<path d="M${s*.36} ${s*.63} Q${s*.44} ${s*.7} ${s*.5} ${s*.68} Q${s*.56} ${s*.7} ${s*.64} ${s*.63}" stroke="${p.face}" stroke-width="${s*.025}" fill="none" stroke-linecap="round"/>`,
        beard: `<circle cx="${s*.5}" cy="${s*.73}" r="${s*.03}" fill="${p.accent}" opacity=".5"/>`,
      }),
      default: (s, p, seed) => {
        const eyeW = [0.07, 0.09, 0.06, 0.08][seed % 4];
        const smileDir = seed % 2 === 0 ? s*0.72 : s*0.65;
        const hatStyle = seed % 3;
        const hat = hatStyle === 0
          ? `<circle cx="${s*.5}" cy="${s*.09}" r="${s*.07}" fill="${p.accent}"/><line x1="${s*.5}" y1="${s*.16}" x2="${s*.5}" y2="${s*.24}" stroke="${p.accent}" stroke-width="${s*.025}"/>`
          : hatStyle === 1
          ? `<rect x="${s*.3}" y="${s*.06}" width="${s*.4}" height="${s*.12}" rx="${s*.04}" fill="${p.accent}" opacity=".7"/>`
          : `<polygon points="${s*.5},${s*.03} ${s*.38},${s*.18} ${s*.62},${s*.18}" fill="${p.accent}" opacity=".8"/>`;
        return {
          head: `<circle cx="${s*.5}" cy="${s*.5}" r="${s*.42}" fill="${p.bg}"/>`,
          extras: hat,
          eyes: `<ellipse cx="${s*.36}" cy="${s*.45}" rx="${eyeW}" ry="${eyeW*0.85}" fill="${p.face}"/>
                 <ellipse cx="${s*.64}" cy="${s*.45}" rx="${eyeW}" ry="${eyeW*0.85}" fill="${p.face}"/>
                 <circle cx="${s*.34}" cy="${s*.43}" r="${eyeW*0.35}" fill="${p.shine}"/>
                 <circle cx="${s*.62}" cy="${s*.43}" r="${eyeW*0.35}" fill="${p.shine}"/>`,
          brows: `<path d="M${s*.27} ${s*.34} Q${s*.36} ${s*.29} ${s*.45} ${s*.34}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>
                  <path d="M${s*.55} ${s*.34} Q${s*.64} ${s*.29} ${s*.73} ${s*.34}" stroke="${p.face}" stroke-width="${s*.022}" fill="none" stroke-linecap="round"/>`,
          mouth: `<path d="M${s*.34} ${s*.63} Q${s*.5} ${smileDir} ${s*.66} ${s*.63}" stroke="${p.face}" stroke-width="${s*.028}" fill="none" stroke-linecap="round"/>`,
          beard: '',
        };
      }
    };

    function makeAvatar(memberId, size, paletteIdx) {
      const p = AVATAR_PALETTES[paletteIdx % AVATAR_PALETTES.length];
      const seed = memberId.split('').reduce((a,c) => a + c.charCodeAt(0), 0);
      const s = size;
      const r = size / 2;

      const faceFn = MEMBER_FACES[memberId] || ((sz, pal) => MEMBER_FACES.default(sz, pal, seed));
      const f = faceFn(s, p, seed);

      return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
        ${f.head}
        ${f.extras}
        ${f.brows}
        ${f.eyes}
        ${f.mouth}
        ${f.beard}
      </svg>`;
    }

    // ── Node layout (molecule positions) ──
    // Positions as % of canvas width/height
    // Designed to look like a molecule/node graph
    const NODE_POSITIONS = {
      // Gen 0 — grandparents (top)
      rafiq_khan: { x: 28, y: 14 },
      mukhadis:   { x: 38, y: 10 },
      abdul_hai:  { x: 62, y: 10 },
      rabiyah:    { x: 72, y: 14 },
      // Gen 1 — parents & siblings
      viq:        { x: 20, y: 34 },
      meher:      { x: 38, y: 36 },
      arshad:     { x: 58, y: 36 },
      azhar:      { x: 72, y: 28 },
      athar:      { x: 80, y: 36 },
      ruksana:    { x: 88, y: 44 },
      // Gen 2 — our generation
      haana:      { x: 30, y: 58 },
      saara:      { x: 45, y: 62 },
      aalia:      { x: 58, y: 60 },
      farhan:     { x: 54, y: 72 },
      kamran:     { x: 72, y: 55 },
      zuhair:     { x: 80, y: 62 },
      maha:       { x: 88, y: 55 },
      // Gen 3
      izza:       { x: 46, y: 82 },
    };

    const NODE_SIZES = {
      rafiq_khan: 64, mukhadis: 64, abdul_hai: 64, rabiyah: 64,
      meher: 82, arshad: 82,
      viq: 58, azhar: 54, athar: 58, ruksana: 54,
      haana: 72, saara: 68, aalia: 68, farhan: 54,
      kamran: 50, zuhair: 50, maha: 50,
      izza: 48,
    };

    const CONNECTIONS = [
      ['rafiq_khan','mukhadis'],['rafiq_khan','meher'],['rafiq_khan','viq'],
      ['mukhadis','meher'],['mukhadis','viq'],
      ['abdul_hai','rabiyah'],['abdul_hai','arshad'],['abdul_hai','azhar'],['abdul_hai','athar'],
      ['rabiyah','arshad'],
      ['meher','arshad'],
      ['meher','haana'],['meher','saara'],['meher','aalia'],
      ['arshad','haana'],['arshad','saara'],['arshad','aalia'],
      ['athar','ruksana'],['athar','kamran'],['athar','zuhair'],['athar','maha'],
      ['saara','farhan'],['saara','izza'],['farhan','izza'],
    ];

    const MEMBERS = TREE.rafiq.members;
    const FAMILY_RECIPES = RECIPES.rafiq;

    function getRecipes(id) { return FAMILY_RECIPES.filter(r => r.assignedTo === id); }

    // ── Render nodes ──
    const canvas = document.getElementById('treeCanvas');
    const svgEl  = document.getElementById('moleculeSvg');
    const nodeEls = {};
    let paletteIdx = 0;

    Object.entries(NODE_POSITIONS).forEach(([id, pos]) => {
      const member  = MEMBERS[id];
      if (!member) return;

      const size    = NODE_SIZES[id] || 60;
      const recipes = getRecipes(id);
      const isMe    = id === 'haana';

      const node = document.createElement('div');
      node.className = 'node' + (isMe ? ' active' : '');
      node.id = 'node-' + id;
      node.style.left = pos.x + '%';
      node.style.top  = (pos.y + 6) + '%'; // offset for nav
      node.onclick = (e) => { e.stopPropagation(); showPanel(id, node); };

      node.innerHTML = `
        <div class="node-bubble" style="width:${size}px;height:${size}px;${isMe ? 'box-shadow:0 0 0 3px var(--clay);' : ''}">
          ${makeAvatar(id, size, paletteIdx)}
          ${recipes.length > 0 ? `<div class="node-recipe-badge">${recipes.length}</div>` : ''}
        </div>
        <div class="node-label">
          ${member.name}
          ${isMe ? '<span style="color:var(--clay);font-size:0.65rem;"> · me</span>' : ''}
        </div>
        <div class="node-role">${member.role}</div>
      `;

      canvas.appendChild(node);
      nodeEls[id] = node;
      paletteIdx++;
    });

    // ── Draw SVG connectors ──
    function drawConnectors() {
      svgEl.innerHTML = '';
      const W = canvas.offsetWidth;
      const H = canvas.offsetHeight || window.innerHeight;

      CONNECTIONS.forEach(([a, b]) => {
        const na = document.getElementById('node-' + a);
        const nb = document.getElementById('node-' + b);
        if (!na || !nb) return;

        const ra = na.getBoundingClientRect();
        const rb = nb.getBoundingClientRect();
        const ca = canvas.getBoundingClientRect();

        const x1 = ra.left + ra.width/2  - ca.left;
        const y1 = ra.top  + ra.height/2 - ca.top;
        const x2 = rb.left + rb.width/2  - ca.left;
        const y2 = rb.top  + rb.height/2 - ca.top;

        // Determine relationship type for styling
        const coupleLinks = [
          'rafiq_khan-mukhadis','abdul_hai-rabiyah',
          'meher-arshad','athar-ruksana','saara-farhan'
        ];
        const parentLinks = [
          'rafiq_khan-meher','rafiq_khan-viq','mukhadis-meher','mukhadis-viq',
          'abdul_hai-arshad','abdul_hai-azhar','abdul_hai-athar','rabiyah-arshad',
          'meher-haana','meher-saara','meher-aalia',
          'arshad-haana','arshad-saara','arshad-aalia',
          'athar-kamran','athar-zuhair','athar-maha',
          'saara-izza','farhan-izza'
        ];

        const key1 = a + '-' + b;
        const key2 = b + '-' + a;
        const isCouple = coupleLinks.includes(key1) || coupleLinks.includes(key2);
        const isParent = parentLinks.includes(key1) || parentLinks.includes(key2);

        // Draw curved path instead of straight line
        const mx = (x1 + x2) / 2;
        const my = (y1 + y2) / 2 - (isCouple ? 0 : 18);
        const path = document.createElementNS('http://www.w3.org/2000/svg','path');
        const d = `M${x1},${y1} Q${mx},${my} ${x2},${y2}`;
        path.setAttribute('d', d);
        path.setAttribute('fill', 'none');

        if (isCouple) {
          path.setAttribute('stroke', 'rgba(196,120,90,0.55)');
          path.setAttribute('stroke-width', '1.8');
          path.setAttribute('stroke-dasharray', 'none');
        } else if (isParent) {
          path.setAttribute('stroke', 'rgba(107,79,58,0.22)');
          path.setAttribute('stroke-width', '1.2');
          path.setAttribute('stroke-dasharray', '4 4');
        } else {
          path.setAttribute('stroke', 'rgba(200,216,192,0.6)');
          path.setAttribute('stroke-width', '1');
          path.setAttribute('stroke-dasharray', '2 6');
        }

        svgEl.appendChild(path);

        // Relationship label on couple lines
        if (isCouple) {
          const labelEl = document.createElementNS('http://www.w3.org/2000/svg','text');
          labelEl.setAttribute('x', mx);
          labelEl.setAttribute('y', my - 4);
          labelEl.setAttribute('text-anchor', 'middle');
          labelEl.setAttribute('font-size', '8');
          labelEl.setAttribute('font-family', 'Cormorant Garamond, serif');
          labelEl.setAttribute('fill', 'rgba(196,120,90,0.7)');
          labelEl.setAttribute('font-style', 'italic');
          labelEl.textContent = '♡';
          svgEl.appendChild(labelEl);
        }
      });
    }

    setTimeout(drawConnectors, 100);
    window.addEventListener('resize', drawConnectors);

    // ── Highlight panel ──
    let openPanel = null;

    function showPanel(memberId, nodeEl) {
      // Close existing
      if (openPanel) { openPanel.remove(); openPanel = null; }
      document.querySelectorAll('.node.active').forEach(n => {
        if (n.id !== 'node-haana') n.classList.remove('active');
      });

      nodeEl.classList.add('active');

      const member  = MEMBERS[memberId];
      const recipes = getRecipes(memberId);

      const panel = document.createElement('div');
      panel.className = 'highlight-panel';

      const avatarSvg = makeAvatar(memberId, 36, Array.from(canvas.querySelectorAll('.node')).findIndex(n => n.id === 'node-' + memberId));

      let recipeHTML = '';
      if (recipes.length > 0) {
        recipeHTML = `
          <ul class="hp-recipes-preview">
            ${recipes.slice(0,4).map(r => `<li>${r.title}</li>`).join('')}
            ${recipes.length > 4 ? `<li style="opacity:0.4;font-style:italic;">+${recipes.length-4} more…</li>` : ''}
          </ul>
          <p class="hp-note">
            ${MEMBERS[recipes[0].uploadedBy]?.name || 'Someone'} added ${recipes.length} recipe${recipes.length>1?'s':''} · ${formatDate(recipes[0].uploadDate)}
          </p>`;
      } else {
        recipeHTML = `<p class="hp-empty">No recipes yet.</p>`;
      }

      panel.innerHTML = `
        <button class="hp-close" onclick="closePanel()">✕</button>
        <div class="hp-inner">
          <div class="hp-head">
            ${avatarSvg}
            <div>
              <div class="hp-name">${member.name}</div>
              <div class="hp-role-tag">${member.role}</div>
            </div>
          </div>
          ${recipeHTML}
          <a class="hp-cta" href="recipe.html?member=${memberId}">
            Open ${member.name}'s Recipes →
          </a>
        </div>
      `;

      document.body.appendChild(panel);
      openPanel = panel;

      // Position near node
      const rect = nodeEl.getBoundingClientRect();
      let left = rect.right + 12;
      let top  = rect.top;
      if (left + 235 > window.innerWidth - 10) left = rect.left - 242;
      if (left < 8) left = 8;
      if (top + 320 > window.innerHeight - 10) top = window.innerHeight - 325;
      panel.style.left = left + 'px';
      panel.style.top  = top + 'px';
    }

    function closePanel() {
      if (openPanel) { openPanel.remove(); openPanel = null; }
      document.querySelectorAll('.node.active').forEach(n => {
        if (n.id !== 'node-haana') n.classList.remove('active');
      });
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.node') && !e.target.closest('.highlight-panel')) closePanel();
    });

    function formatDate(d) {
      return new Date(d).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast'; t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3200);
    }
  </script>
</body>
</html>
